<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Notes</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f9;
  padding:20px;
}

h1{
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.chapter{
  background:#fff;
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.back{
  background:#16a34a;
}
</style>
</head>

<body>

<h1>📚 School Notes</h1>

<button onclick="goHome()">Home</button>

<div id="content"></div>

<!-- PDF VIEWER -->
<div id="viewer" style="display:none;">
  <button onclick="closePDF()">Close</button>
  <iframe id="pdf" style="width:100%;height:80vh;border:none;"></iframe>
</div>

<script>

const KEY = "school_notes";

function getData(){
  return JSON.parse(localStorage.getItem(KEY)) || {
    6:{English:[],Khasi:[],Maths:[],Science:[],Computer:[]},
    7:{English:[],Khasi:[],Maths:[],Science:[],Computer:[]},
    8:{English:[],Khasi:[],Maths:[],Science:[],Computer:[]}
  };
}

function goHome(){

  let html = `<div class="grid">`;

  for(let c of [6,7,8]){
    html += `
      <div class="card">
        <h2>Class ${c}</h2>
        <button onclick="openClass(${c})">Open</button>
      </div>
    `;
  }

  html += `</div>`;

  document.getElementById("content").innerHTML = html;
}

function openClass(c){

  let data = getData();

  let html = `<button class="back" onclick="goHome()">← Back</button><h2>Class ${c}</h2><div class="grid">`;

  for(let subject in data[c]){

    html += `
      <div class="card">
        <h3>${subject}</h3>
        <button onclick="openSubject(${c},'${subject}')">Open</button>
      </div>
    `;
  }

  html += `</div>`;

  document.getElementById("content").innerHTML = html;
}

function openSubject(c,subject){

  let data = getData();

  let chapters = data[c][subject];

  let html = `<button class="back" onclick="openClass(${c})">← Back</button>
  <h2>${subject}</h2>`;

  if(chapters.length === 0){
    html += `<p>No chapters yet</p>`;
  }

  chapters.forEach(ch => {
    html += `
      <div class="chapter">
        <span>${ch.title}</span>
        <button onclick="openPDF('${ch.file}')">Open</button>
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

function openPDF(link){
  document.getElementById("viewer").style.display = "block";
  document.getElementById("pdf").src = link;
  document.getElementById("content").style.display = "none";
}

function closePDF(){
  document.getElementById("viewer").style.display = "none";
  document.getElementById("content").style.display = "block";
}

goHome();

</script>

</body>
</html>
