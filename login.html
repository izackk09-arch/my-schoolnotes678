<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f2f2f2;
}

.box{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Admin Login</h2>
  <input type="password" id="pass" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<script>

function login(){
  let pass = document.getElementById("pass").value;

  if(pass === "1234"){
    sessionStorage.setItem("admin","yes"); // ✅ MUST BE EXACT
    window.location.href = "admin.html";
  }
  else{
    alert("Wrong password");
  }
}

</script>

</body>
</html>
