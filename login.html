<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body style="font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#f4f6f9;">

<div style="background:white;padding:20px;border-radius:10px;width:300px;box-shadow:0 5px 15px rgba(0,0,0,0.2);">

<h2>Admin Login</h2>

<input id="user" placeholder="Username" style="width:100%;padding:10px;margin:10px 0;">
<input id="pass" type="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;">

<button onclick="login()" style="width:100%;padding:10px;background:#16a34a;color:white;border:none;">
Login
</button>

</div>

<script>

const ADMIN_USER = "admin";
const ADMIN_PASS = "1234";

function login(){

  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === ADMIN_USER && p === ADMIN_PASS){

    sessionStorage.setItem("admin","yes");

    window.location.href = "admin.html";

  } else {
    alert("Wrong username or password");
  }
}

</script>

</body>
</html>
