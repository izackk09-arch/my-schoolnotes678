<!-- index.html -->

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Notes</title>

<style>

body{
  font-family:Arial;
  background:#f4f6f9;
  padding:20px;
}

h1{
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  opacity:0.9;
}

.back{
  background:#16a34a;
}

iframe{
  width:100%;
  height:400px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

#loginBox{
  margin-top:40px;
  text-align:center;
}

input{
  padding:10px;
  width:250px;
  border-radius:8px;
  border:1px solid #ccc;
}

a{
  text-decoration:none;
}

</style>
</head>

<body>

<h1>📚 School Notes</h1>

<div id="content"></div>

<!-- ADMIN LOGIN -->
<div id="loginBox">

<hr>

<h3>🔐 Admin Login</h3>

<input 
type="password" 
id="adminPass" 
placeholder="Enter admin password"
>

<br>

<button onclick="adminLogin()">
  Login
</button>

</div>

<script>

const KEY = "school_notes_data_v6";

/* LOGIN */
function adminLogin(){

  let pass = document
    .getElementById("adminPass")
    .value;

  if(pass === "1234"){

    sessionStorage.setItem(
      "admin",
      "yes"
    );

    window.location.href = "admin.html";

  }else{

    alert("Wrong password");

  }

}

/* HOME */
function goHome(){

  document.getElementById(
    "loginBox"
  ).style.display = "block";

  document.getElementById(
    "content"
  ).innerHTML = `

  <div class="grid">

    <div class="card">

      <h2>Class 6</h2>

      <button onclick="openClass(6)">
        Open
      </button>

    </div>

    <div class="card">

      <h2>Class 7</h2>

      <button onclick="openClass(7)">
        Open
      </button>

    </div>

    <div class="card">

      <h2>Class 8</h2>

      <button onclick="openClass(8)">
        Open
      </button>

    </div>

  </div>

  `;

}

/* OPEN CLASS */
function openClass(c){

  document.getElementById(
    "loginBox"
  ).style.display = "none";

  let data = getData();

  let html = `

  <button 
  class="back" 
  onclick="goHome()">
    ← Back
  </button>

  <h2>Class ${c}</h2>

  <div class="grid">

  `;

  let subjects = data[c];

  if(Object.keys(subjects).length === 0){

    html += `

    <p>No subjects added yet</p>

    `;

  }

  for(let s in subjects){

    html += `

    <div class="card">

      <h3>${s}</h3>

      <button 
      onclick="openSubject(${c}, '${s}')">
        Open
      </button>

    </div>

    `;

  }

  html += `</div>`;

  document.getElementById(
    "content"
  ).innerHTML = html;

}

/* OPEN SUBJECT */
function openSubject(c,s){

  let data = getData();

  let chapters = data[c][s];

  let html = `

  <button 
  class="back" 
  onclick="openClass(${c})">
    ← Back
  </button>

  <h2>${s}</h2>

  `;

  if(!chapters || chapters.length === 0){

    html += `

    <p>No notes available</p>

    `;

  }else{

    chapters.forEach(ch => {

      html += `

      <div class="card">

        <h3>${ch.title}</h3>

        <iframe src="${ch.file}"></iframe>

        <br>

        <a 
        href="${ch.file}" 
        target="_blank">

          <button>
            Open PDF
          </button>

        </a>

      </div>

      `;

    });

  }

  document.getElementById(
    "content"
  ).innerHTML = html;

}

/* GET DATA */
function getData(){

  return JSON.parse(
    localStorage.getItem(KEY)
  ) || {

    6:{
      "Computer":[]
    },

    7:{
      "Computer":[]
    },

    8:{
      "Computer":[]
    }

  };

}

/* START */
goHome();

</script>

</body>
</html>
