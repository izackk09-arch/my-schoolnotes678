<!DOCTYPE html><html>

<title>School Notes</title><style>

body{

}

  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.back{
  background:#16a34a;
}

a{
  text-decoration:none;
}
