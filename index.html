<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Notes</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f9;
  padding:20px;
}

h1{text-align:center;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.back{
  background:#16a34a;
}

#loginBox{
  margin-top:30px;
}
</style>
</head>

<body>

<h1>📚 School Notes</h1>

<div id="content"></div>

<!-- 🔐 ADMIN LOGIN (ONLY HOME PAGE) -->
<div id="loginBox">
  <hr>

  <h3>Admin Login</h3>

  <input type="password" id="adminPass" placeholder="Enter admin password">
  <button onclick="adminLogin()">Login</button>
</div>

<script>

const KEY = "school_notes_data_v5";

/* 🔐 LOGIN */
function adminLogin(){
  let pass = document.getElementById("adminPass").value;

  if(pass === "1234"){
    sessionStorage.setItem("admin","yes");
    window.location.href = "admin.html";
  } else {
    alert("Wrong password");
  }
}

/* 🏠 HOME */
function goHome(){

  document.getElementById("loginBox").style.display = "block";

  document.getElementById("content").innerHTML = `
    <div class="grid">
      <div class="card">
        <h2>Class 6</h2>
        <button onclick="openClass(6)">Open</button>
      </div>

      <div class="card">
        <h2>Class 7</h2>
        <button onclick="openClass(7)">Open</button>
      </div>

      <div class="card">
        <h2>Class 8</h2>
        <button onclick="openClass(8)">Open</button>
      </div>
    </div>
  `;
}

/* 📚 CLASS (NO SUBJECTS ANYMORE) */
function openClass(c){

  document.getElementById("loginBox").style.display = "none";

  document.getElementById("content").innerHTML = `
    <button class="back" onclick="goHome()">← Back</button>
    <h2>Class ${c}</h2>
    <p>No notes available yet</p>
  `;
}

/* START */
goHome();

</script>

</body>
</html>
