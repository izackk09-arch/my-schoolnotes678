<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Notes</title>

<style>

body{
  font-family:Arial;
  background:#f4f6f9;
  padding:20px;
}

h1{
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  margin-top:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  opacity:0.9;
}

.back{
  background:#16a34a;
}

a{
  text-decoration:none;
}

</style>
</head>

<body>

<h1>📚 School Notes</h1>

<div id="content"></div>

document.getElementById("content").innerHTML = `

</div>

</button>

</div>

</button>

</div>

</div>

`;

}
